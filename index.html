<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOCHI MAZE — Cyber Cat Escape</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap');

  :root {
    --cyan: #00f5ff;
    --magenta: #cc44ff;
    --purple: #8833cc;
    --dark: #050a14;
    --panel: #0a1525;
    --wall: #1a2a3a;
    --wall-glow: #1e3a5a;
    --path: #0d1e2e;
    --neon-green: #39ff14;
    --orange: #ff6600;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    color: #e0f0ff;
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,245,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Scanlines */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.15) 2px,
      rgba(0,0,0,0.15) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  #app {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 900px;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 12px;
    gap: 10px;
  }

  header {
    text-align: center;
    width: 100%;
  }

  h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 2rem;
    font-weight: 900;
    letter-spacing: 0.3em;
    background: linear-gradient(90deg, var(--cyan), var(--magenta), var(--cyan));
    background-size: 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shimmer 3s linear infinite;
    text-shadow: none;
    filter: drop-shadow(0 0 20px rgba(0,245,255,0.5));
  }

  .subtitle {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.65rem;
    letter-spacing: 0.5em;
    color: var(--magenta);
    opacity: 0.8;
    margin-top: 2px;
  }

  @keyframes shimmer {
    0% { background-position: 0% 50%; }
    100% { background-position: 200% 50%; }
  }

  .hud {
    display: flex;
    gap: 16px;
    align-items: center;
    width: 100%;
    justify-content: center;
    flex-wrap: wrap;
  }

  .hud-panel {
    background: var(--panel);
    border: 1px solid rgba(0,245,255,0.2);
    border-radius: 6px;
    padding: 6px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    box-shadow: inset 0 0 20px rgba(0,245,255,0.03), 0 0 10px rgba(0,245,255,0.1);
  }

  .hud-label { color: var(--cyan); opacity: 0.6; font-size: 0.55rem; letter-spacing: 0.2em; }
  .hud-value { color: #fff; font-size: 0.9rem; font-weight: 700; }

  #level-val { color: var(--magenta); }
  #moves-val { color: var(--cyan); }
  #time-val { color: var(--neon-green); }

  .game-area {
    display: flex;
    gap: 16px;
    align-items: flex-start;
    width: 100%;
    justify-content: center;
  }

  #maze-container {
    position: relative;
    border: 2px solid rgba(0,245,255,0.3);
    border-radius: 8px;
    box-shadow:
      0 0 0 1px rgba(0,245,255,0.1),
      0 0 30px rgba(0,245,255,0.15),
      0 0 60px rgba(204,68,255,0.1),
      inset 0 0 30px rgba(0,0,0,0.5);g
    overflow: hidden;
    flex-shrink: 0;
  }

  #maze-canvas {
    display: block;
  }

  .side-panel {
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-width: 160px;
  }

  .ctrl-box {
    background: var(--panel);
    border: 1px solid rgba(204,68,255,0.2);
    border-radius: 8px;
    padding: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    box-shadow: 0 0 15px rgba(204,68,255,0.1);
  }

  .ctrl-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.55rem;
    letter-spacing: 0.3em;
    color: var(--magenta);
    margin-bottom: 4px;
  }

  .ctrl-row {
    display: flex;
    gap: 6px;
  }

  .ctrl-btn {
    width: 42px;
    height: 42px;
    background: linear-gradient(135deg, #1a2a3a, #0d1a25);
    border: 1px solid rgba(0,245,255,0.3);
    border-radius: 6px;
    color: var(--cyan);
    font-size: 1.2rem;
    cursor: pointer;
    transition: all 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Rajdhani', sans-serif;
    box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    user-select: none;
    -webkit-user-select: none;
  }

  .ctrl-btn:active, .ctrl-btn.pressed {
    background: linear-gradient(135deg, rgba(0,245,255,0.2), rgba(0,245,255,0.05));
    box-shadow: 0 0 12px rgba(0,245,255,0.4), inset 0 0 8px rgba(0,245,255,0.1);
    transform: translateY(1px);
  }

  .action-btn {
    width: 100%;
    padding: 9px;
    border-radius: 6px;
    border: none;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 700;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--purple), var(--magenta));
    color: #fff;
    box-shadow: 0 0 15px rgba(204,68,255,0.3);
  }
  .btn-primary:hover {
    box-shadow: 0 0 25px rgba(204,68,255,0.5);
    transform: translateY(-1px);
  }

  .btn-secondary {
    background: transparent;
    border: 1px solid rgba(0,245,255,0.3) !important;
    color: var(--cyan);
  }
  .btn-secondary:hover {
    background: rgba(0,245,255,0.05);
    box-shadow: 0 0 15px rgba(0,245,255,0.2);
  }

  .legend-box {
    background: var(--panel);
    border: 1px solid rgba(0,245,255,0.15);
    border-radius: 8px;
    padding: 12px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.75rem;
    color: rgba(200,220,255,0.7);
    margin: 4px 0;
    font-family: 'Rajdhani', sans-serif;
    letter-spacing: 0.05em;
  }

  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* Overlays */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(5,10,20,0.92);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    backdrop-filter: blur(6px);
  }

  .overlay-card {
    background: var(--panel);
    border: 1px solid rgba(0,245,255,0.3);
    border-radius: 16px;
    padding: 40px 48px;
    text-align: center;
    max-width: 420px;
    box-shadow:
      0 0 40px rgba(0,245,255,0.15),
      0 0 80px rgba(204,68,255,0.1);
    animation: cardIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes cardIn {
    from { opacity: 0; transform: scale(0.8) translateY(20px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .overlay-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.8rem;
    font-weight: 900;
    background: linear-gradient(90deg, var(--cyan), var(--magenta));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }

  .overlay-sub {
    color: rgba(200,220,255,0.6);
    font-size: 0.9rem;
    margin-bottom: 24px;
    letter-spacing: 0.05em;
  }

  .overlay-stats {
    display: flex;
    gap: 20px;
    justify-content: center;
    margin: 20px 0 28px;
  }

  .stat-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .stat-num {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--cyan);
  }

  .stat-lbl {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: rgba(200,220,255,0.5);
    font-family: 'Orbitron', sans-serif;
  }

  .hidden { display: none !important; }

  .mascot-display {
    margin: 16px 0;
  }

  .mascot-display canvas {
    border-radius: 50%;
    box-shadow: 0 0 30px rgba(204,68,255,0.5), 0 0 60px rgba(0,245,255,0.2);
  }

  /* Responsive */
  @media (max-width: 680px) {
    .game-area { flex-direction: column; align-items: center; }
    .side-panel { flex-direction: row; flex-wrap: wrap; justify-content: center; min-width: unset; width: 100%; }
    .ctrl-box { flex: 0 0 auto; }
    .legend-box { display: none; }
    h1 { font-size: 1.3rem; }
  }
</style>
</head>
<body>

<div id="app">
  <header>
    <h1>MOCHI MAZE</h1>
    <div class="subtitle">CYBER CAT ESCAPE PROTOCOL</div>
  </header>

  <div class="hud">
    <div class="hud-panel">
      <span class="hud-label">LEVEL</span>
      <span class="hud-value" id="level-val">01</span>
    </div>
    <div class="hud-panel">
      <span class="hud-label">MOVES</span>
      <span class="hud-value" id="moves-val">000</span>
    </div>
    <div class="hud-panel">
      <span class="hud-label">TIME</span>
      <span class="hud-value" id="time-val">00:00</span>
    </div>
    <div class="hud-panel">
      <span class="hud-label">BEST</span>
      <span class="hud-value" id="best-val">—</span>
    </div>
  </div>

  <div class="game-area">
    <div id="maze-container">
      <canvas id="maze-canvas"></canvas>
    </div>

    <div class="side-panel">
      <div class="ctrl-box">
        <div class="ctrl-title">NAVIGATE</div>
        <div class="ctrl-row">
          <button class="ctrl-btn" id="btn-up" aria-label="Up">▲</button>
        </div>
        <div class="ctrl-row">
          <button class="ctrl-btn" id="btn-left" aria-label="Left">◀</button>
          <button class="ctrl-btn" id="btn-down" aria-label="Down">▼</button>
          <button class="ctrl-btn" id="btn-right" aria-label="Right">▶</button>
        </div>
      </div>

      <button class="action-btn btn-primary" id="btn-new">⟳ NEW MAZE</button>
      <button class="action-btn btn-secondary action-btn" id="btn-hint" style="border:1px solid rgba(0,245,255,0.3); padding: 9px; border-radius:6px; font-family:'Orbitron',sans-serif; font-size:0.6rem; letter-spacing:0.15em; cursor:pointer; color:var(--cyan); background:transparent; font-weight:700;">◈ HINT</button>

      <div class="legend-box">
        <div class="legend-item">
          <div class="dot" style="background:var(--cyan); box-shadow:0 0 6px var(--cyan)"></div>
          START
        </div>
        <div class="legend-item">
          <div class="dot" style="background:var(--magenta); box-shadow:0 0 6px var(--magenta)"></div>
          EXIT PORTAL
        </div>
        <div class="legend-item">
          <div class="dot" style="background:rgba(0,245,255,0.3); border:1px solid rgba(0,245,255,0.5); width:10px; height:10px; border-radius:2px"></div>
          WALL
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Start Overlay -->
<div class="overlay" id="start-overlay">
  <div class="overlay-card">
    <div id="mascot-canvas-wrapper" class="mascot-display">
      <canvas id="mascot-preview" width="100" height="100"></canvas>
    </div>
    <div class="overlay-title">GENLAYER MAZE</div>
    <div class="overlay-sub">Guide mochi through the neon labyrinth to the exit portal. Use arrow keys or on-screen controls.</div>
    <button class="action-btn btn-primary" onclick="startGame()" style="margin-top:8px">▶ LAUNCH</button>
  </div>
</div>

<!-- Win Overlay -->
<div class="overlay hidden" id="win-overlay">
  <div class="overlay-card">
    <div class="overlay-title">ESCAPED!</div>
    <div class="overlay-sub">Mochi found the exit portal</div>
    <div class="overlay-stats">
      <div class="stat-item">
        <div class="stat-num" id="win-moves">0</div>
        <div class="stat-lbl">MOVES</div>
      </div>
      <div class="stat-item">
        <div class="stat-num" id="win-time">0:00</div>
        <div class="stat-lbl">TIME</div>
      </div>
    </div>
    <button class="action-btn btn-primary" onclick="nextLevel()">NEXT LEVEL ▶</button>
  </div>
</div>

let mascotLoaded = false;
mascotImg.onload = () => {
  mascotLoaded = true;
  drawMascotPreview();
};

function drawMascotPreview() {
  const pc = document.getElementById('mascot-preview');
  if (!pc) return;
  const pctx = pc.getContext('2d');
  pctx.clearRect(0,0,100,100);
  if (mascotLoaded) {
    pctx.save();
    pctx.beginPath();
    pctx.arc(50,50,46,0,Math.PI*2);
    pctx.clip();
    pctx.drawImage(mascotImg, 0, 0, mascotImg.width, mascotImg.height, 4, 4, 92, 92);
    pctx.restore();
    // Glow ring
    pctx.beginPath();
    pctx.arc(50,50,47,0,Math.PI*2);
    pctx.strokeStyle = 'rgba(204,68,255,0.8)';
    pctx.lineWidth = 2;
    pctx.stroke();
  }
}

// ─── MAZE GENERATION (Recursive Backtracker) ──────────────────────────────────
function generateMaze(cols, rows) {
  const cells = Array.from({length: rows}, () =>
    Array.from({length: cols}, () => ({
      visited: false,
      walls: {top: true, right: true, bottom: true, left: true}
    }))
  );

  function carve(x, y) {
    cells[y][x].visited = true;
    const dirs = shuffle([
      {dx:0,dy:-1,wall:'top',opp:'bottom'},
      {dx:1,dy:0,wall:'right',opp:'left'},
      {dx:0,dy:1,wall:'bottom',opp:'top'},
      {dx:-1,dy:0,wall:'left',opp:'right'},
    ]);
    for (const d of dirs) {
      const nx = x + d.dx, ny = y + d.dy;
      if (nx>=0 && ny>=0 && nx<cols && ny<rows && !cells[ny][nx].visited) {
        cells[y][x].walls[d.wall] = false;
        cells[ny][nx].walls[d.opp] = false;
        carve(nx, ny);
      }
    }
  }
  carve(0, 0);
  return cells;
}

function shuffle(arr) {
  for (let i=arr.length-1;i>0;i--) {
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}

// ─── PATHFINDING (BFS for hint) ───────────────────────────────────────────────
function bfs(maze, start, end) {
  const queue = [[start]];
  const visited = new Set([`${start.x},${start.y}`]);
  while (queue.length) {
    const path = queue.shift();
    const cur = path[path.length-1];
    if (cur.x === end.x && cur.y === end.y) return path;
    const cell = maze[cur.y][cur.x];
    const moves = [
      {dx:0,dy:-1,wall:'top'},{dx:1,dy:0,wall:'right'},
      {dx:0,dy:1,wall:'bottom'},{dx:-1,dy:0,wall:'left'}
    ];
    for (const m of moves) {
      const nx=cur.x+m.dx, ny=cur.y+m.dy;
      const key=`${nx},${ny}`;
      if (!cell.walls[m.wall] && !visited.has(key) && nx>=0&&ny>=0&&nx<COLS&&ny<ROWS) {
        visited.add(key);
        queue.push([...path, {x:nx,y:ny}]);
      }
    }
  }
  return [];
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
function initLevel() {
  COLS = Math.min(9 + level * 2, 21);
  ROWS = COLS;

  const maxW = Math.min(window.innerWidth - 200, 520);
  const maxH = window.innerHeight - 220;
  CELL = Math.floor(Math.min(maxW/COLS, maxH/ROWS));
  CELL = Math.max(CELL, 22);

  canvas.width = COLS * CELL;
  canvas.height = ROWS * CELL;

  maze = generateMaze(COLS, ROWS);
  player = {x:0, y:0};
  goal = {x: COLS-1, y: ROWS-1};
  moves = 0;
  showHint = false;
  hintPath = [];
  walkAnim = 0;
  portalAnim = 0;

  playerPx = {x: player.x * CELL, y: player.y * CELL};
  targetPx = {...playerPx};
  moving = false;

  document.getElementById('level-val').textContent = String(level).padStart(2,'0');
  document.getElementById('moves-val').textContent = String(moves).padStart(3,'0');

  startTimer();
  if (rafId) cancelAnimationFrame(rafId);
  renderLoop();
}

// ─── TIMER ────────────────────────────────────────────────────────────────────
function startTimer() {
  if (timerInterval) clearInterval(timerInterval);
  startTime = Date.now();
  timerInterval = setInterval(updateTimer, 1000);
}

function updateTimer() {
  const elapsed = Math.floor((Date.now()-startTime)/1000);
  const m = Math.floor(elapsed/60), s = elapsed%60;
  document.getElementById('time-val').textContent =
    String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}

function getElapsedTime() {
  return Math.floor((Date.now()-startTime)/1000);
}

// ─── RENDERING ────────────────────────────────────────────────────────────────
function renderLoop() {
  animFrame++;
  portalAnim += 0.05;

  // Smooth movement
  if (moving) {
    const speed = CELL * 0.25;
    const dx = targetPx.x - playerPx.x;
    const dy = targetPx.y - playerPx.y;
    const dist = Math.sqrt(dx*dx+dy*dy);
    if (dist < speed) {
      playerPx = {...targetPx};
      moving = false;
    } else {
      playerPx.x += (dx/dist)*speed;
      playerPx.y += (dy/dist)*speed;
    }
    walkAnim += 0.35;
  }

  drawMaze();
  rafId = requestAnimationFrame(renderLoop);
}

function drawMaze() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0,0,W,H);

  // Dark background
  ctx.fillStyle = '#050d18';
  ctx.fillRect(0,0,W,H);

  // Subtle grid
  ctx.strokeStyle = 'rgba(0,245,255,0.04)';
  ctx.lineWidth = 0.5;
  for (let x=0;x<=W;x+=CELL) {
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke();
  }
  for (let y=0;y<=H;y+=CELL) {
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
  }

  // Draw hint path
  if (showHint && hintPath.length) {
    for (let i=0;i<hintPath.length;i++) {
      const p = hintPath[i];
      const alpha = 0.12 + 0.08 * Math.sin(animFrame*0.05 + i*0.3);
      ctx.fillStyle = `rgba(0,245,255,${alpha})`;
      ctx.fillRect(p.x*CELL+2, p.y*CELL+2, CELL-4, CELL-4);
    }
  }

  // Draw start marker
  const sg = ctx.createRadialGradient(
    CELL/2, CELL/2, 0, CELL/2, CELL/2, CELL/2
  );
  sg.addColorStop(0, 'rgba(0,245,255,0.25)');
  sg.addColorStop(1, 'rgba(0,245,255,0)');
  ctx.fillStyle = sg;
  ctx.fillRect(0, 0, CELL, CELL);

  // Draw goal / portal
  drawPortal(goal.x, goal.y);

  // Draw walls
  for (let y=0;y<ROWS;y++) {
    for (let x=0;x<COLS;x++) {
      drawCellWalls(x, y);
    }
  }

  // Draw player
  drawPlayer();
}

function drawPortal(x, y) {
  const px = x*CELL, py = y*CELL;
  const cx = px+CELL/2, cy = py+CELL/2;
  const t = portalAnim;

  // Pulsing glow
  const pulse = 0.5 + 0.5*Math.sin(t*2);
  const grad = ctx.createRadialGradient(cx,cy,0,cx,cy,CELL*0.7);
  grad.addColorStop(0, `rgba(204,68,255,${0.4+pulse*0.3})`);
  grad.addColorStop(0.5, `rgba(204,68,255,${0.1+pulse*0.1})`);
  grad.addColorStop(1, 'rgba(204,68,255,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(px, py, CELL, CELL);

  // Spinning rings
  ctx.save();
  ctx.translate(cx, cy);
  for (let r=0;r<3;r++) {
    ctx.save();
    ctx.rotate(t*(1+r*0.4));
    ctx.beginPath();
    ctx.arc(0, 0, CELL*0.3*(1-r*0.08), 0, Math.PI*2);
    ctx.strokeStyle = `rgba(${r===0?'204,68,255':r===1?'0,245,255':'136,51,204'},${0.7-r*0.15})`;
    ctx.lineWidth = 2 - r*0.5;
    ctx.setLineDash([4,4]);
    ctx.lineDashOffset = -t*10;
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  }

  // Center star
  ctx.fillStyle = `rgba(255,255,255,${0.7+pulse*0.3})`;
  for (let i=0;i<4;i++) {
    ctx.save();
    ctx.rotate(t + i*Math.PI/2);
    ctx.beginPath();
    ctx.ellipse(0, 0, 3, CELL*0.18, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  ctx.restore();
}

function drawCellWalls(x, y) {
  const cell = maze[y][x];
  const px = x*CELL, py = y*CELL;

  const wallColor = 'rgba(0,245,255,0.6)';
  const wallGlow = 'rgba(0,245,255,0.15)';
  ctx.lineWidth = 2;
  ctx.lineCap = 'square';

  function drawWall(x1,y1,x2,y2) {
    // Glow
    ctx.strokeStyle = wallGlow;
    ctx.lineWidth = 6;
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
    // Main wall
    ctx.strokeStyle = wallColor;
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  }

  if (cell.walls.top)    drawWall(px,py,px+CELL,py);
  if (cell.walls.right)  drawWall(px+CELL,py,px+CELL,py+CELL);
  if (cell.walls.bottom) drawWall(px,py+CELL,px+CELL,py+CELL);
  if (cell.walls.left)   drawWall(px,py,px,py+CELL);
}

function drawPlayer() {
  const px = playerPx.x, py = playerPx.y;
  const cx = px + CELL/2, cy = py + CELL/2;
  const size = CELL * 0.85;

  ctx.save();
  ctx.translate(cx, cy);

  // Flip based on direction
  if (walkDir === 'left') ctx.scale(-1, 1);

  // Shadow glow
  const grd = ctx.createRadialGradient(0, size*0.3, 0, 0, size*0.3, size*0.6);
  grd.addColorStop(0, 'rgba(204,68,255,0.25)');
  grd.addColorStop(1, 'rgba(204,68,255,0)');
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.ellipse(0, size*0.35, size*0.5, size*0.18, 0, 0, Math.PI*2);
  ctx.fill();

  // Subtle bob when moving
  const bob = moving ? Math.sin(walkAnim)*2 : 0;

  if (mascotLoaded) {
    const s = size;
    ctx.drawImage(
      mascotImg,
      0, 0, mascotImg.width, mascotImg.height,
      -s/2, -s/2 + bob,
      s, s
    );
  } else {
    // Fallback: simple cat shape
    ctx.fillStyle = '#cc44ff';
    ctx.beginPath();
    ctx.arc(0, bob, size*0.35, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#00f5ff';
    ctx.font = `${size*0.35}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🐱', 0, bob);
  }

  ctx.restore();
}

// ─── MOVEMENT ─────────────────────────────────────────────────────────────────
function tryMove(dx, dy) {
  if (moving) return;
  const x = player.x, y = player.y;
  const cell = maze[y][x];
  const wallMap = {
    '0,-1': 'top', '1,0': 'right', '0,1': 'bottom', '-1,0': 'left'
  };
  const wall = wallMap[`${dx},${dy}`];
  if (cell.walls[wall]) return; // blocked

  if (dx > 0) walkDir = 'right';
  if (dx < 0) walkDir = 'left';

  player.x += dx;
  player.y += dy;
  moves++;
  document.getElementById('moves-val').textContent = String(moves).padStart(3,'0');

  targetPx = {x: player.x * CELL, y: player.y * CELL};
  moving = true;

  if (showHint) {
    hintPath = bfs(maze, player, goal);
  }

  if (player.x === goal.x && player.y === goal.y) {
    setTimeout(onWin, 300);
  }
}

// ─── WIN ──────────────────────────────────────────────────────────────────────
function onWin() {
  clearInterval(timerInterval);
  const elapsed = getElapsedTime();
  const m = Math.floor(elapsed/60), s = elapsed%60;
  const timeStr = m > 0 ? `${m}:${String(s).padStart(2,'0')}` : `0:${String(s).padStart(2,'0')}`;

  const key = `level_${level}`;
  if (!bestTimes[key] || elapsed < bestTimes[key]) {
    bestTimes[key] = elapsed;
    document.getElementById('best-val').textContent = timeStr;
  }

  document.getElementById('win-moves').textContent = moves;
  document.getElementById('win-time').textContent = timeStr;
  document.getElementById('win-overlay').classList.remove('hidden');
}

function nextLevel() {
  document.getElementById('win-overlay').classList.add('hidden');
  level++;
  initLevel();
}

function startGame() {
  document.getElementById('start-overlay').classList.add('hidden');
  initLevel();
}

// ─── CONTROLS ─────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
  if (e.key==='ArrowUp'||e.key==='w') tryMove(0,-1);
  if (e.key==='ArrowDown'||e.key==='s') tryMove(0,1);
  if (e.key==='ArrowLeft'||e.key==='a') tryMove(-1,0);
  if (e.key==='ArrowRight'||e.key==='d') tryMove(1,0);
});

function addBtnControl(id, dx, dy) {
  const btn = document.getElementById(id);
  let held = null;
  btn.addEventListener('mousedown', e => { e.preventDefault(); tryMove(dx,dy); btn.classList.add('pressed'); held = setInterval(()=>tryMove(dx,dy),150); });
  btn.addEventListener('touchstart', e => { e.preventDefault(); tryMove(dx,dy); btn.classList.add('pressed'); held = setInterval(()=>tryMove(dx,dy),150); }, {passive:false});
  const release = () => { clearInterval(held); btn.classList.remove('pressed'); };
  btn.addEventListener('mouseup', release);
  btn.addEventListener('mouseleave', release);
  btn.addEventListener('touchend', release);
}

addBtnControl('btn-up',0,-1);
addBtnControl('btn-down',0,1);
addBtnControl('btn-left',-1,0);
addBtnControl('btn-right',1,0);

document.getElementById('btn-new').addEventListener('click', () => {
  document.getElementById('win-overlay').classList.add('hidden');
  initLevel();
});

document.getElementById('btn-hint').addEventListener('click', () => {
  showHint = !showHint;
  if (showHint) {
    hintPath = bfs(maze, player, goal);
    document.getElementById('btn-hint').textContent = '✕ HINT';
    document.getElementById('btn-hint').style.color = 'var(--orange)';
    document.getElementById('btn-hint').style.borderColor = 'rgba(255,102,0,0.4)';
  } else {
    hintPath = [];
    document.getElementById('btn-hint').textContent = '◈ HINT';
    document.getElementById('btn-hint').style.color = 'var(--cyan)';
    document.getElementById('btn-hint').style.borderColor = 'rgba(0,245,255,0.3)';
  }
});

// Swipe support
let touchStart = null;
canvas.addEventListener('touchstart', e => {
  touchStart = {x: e.touches[0].clientX, y: e.touches[0].clientY};
}, {passive:true});
canvas.addEventListener('touchend', e => {
  if (!touchStart) return;
  const dx = e.changedTouches[0].clientX - touchStart.x;
  const dy = e.changedTouches[0].clientY - touchStart.y;
  if (Math.abs(dx) > Math.abs(dy)) {
    if (dx > 20) tryMove(1,0);
    else if (dx < -20) tryMove(-1,0);
  } else {
    if (dy > 20) tryMove(0,1);
    else if (dy < -20) tryMove(0,-1);
  }
  touchStart = null;
}, {passive:true});

// Handle window resize
window.addEventListener('resize', () => {
  if (maze.length) {
    const maxW = Math.min(window.innerWidth - 200, 520);
    const maxH = window.innerHeight - 220;
    const newCell = Math.max(Math.floor(Math.min(maxW/COLS, maxH/ROWS)), 22);
    if (Math.abs(newCell - CELL) > 3) {
      CELL = newCell;
      canvas.width = COLS * CELL;
      canvas.height = ROWS * CELL;
      playerPx = {x: player.x * CELL, y: player.y * CELL};
      targetPx = {...playerPx};
    }
  }
});
</script>
